<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="#10b981"/>

  <!-- Колос — стебло -->
  <line x1="13" y1="46" x2="13" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Верхівка -->
  <ellipse cx="13" cy="26" rx="1.8" ry="2.8" fill="white"/>
  <!-- Зерна ліві -->
  <ellipse cx="10.5" cy="31" rx="2.8" ry="1.3" fill="white" transform="rotate(-38 10.5 31)"/>
  <ellipse cx="10" cy="36" rx="2.8" ry="1.3" fill="white" transform="rotate(-38 10 36)"/>
  <!-- Зерна праві -->
  <ellipse cx="15.5" cy="31" rx="2.8" ry="1.3" fill="white" transform="rotate(38 15.5 31)"/>
  <ellipse cx="16" cy="36" rx="2.8" ry="1.3" fill="white" transform="rotate(38 16 36)"/>
  <!-- Вусики -->
  <line x1="10.5" y1="31" x2="7" y2="28" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="15.5" y1="31" x2="19" y2="28" stroke="white" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Вертикальна лінія -->
  <line x1="22" y1="18" x2="22" y2="46" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Текст AGRO -->
  <text x="25" y="34" font-family="Arial Black, sans-serif" font-weight="900" font-size="11" fill="white" letter-spacing="0.3">AGRO</text>
  <!-- Текст Sim -->
  <text x="25" y="44" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="white" opacity="0.9" letter-spacing="1">Sim</text>
</svg>
